name: Build with DB

on:
  push:
    branches: [ 'master', 'dev', 'devops-branch' ]
  pull_request:
    branches: [ 'master', 'dev', 'devops-branch' ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew


      - name: Start Postgres via docker compose
        run: |
          docker compose up -d postgres --wait

      - name: Verify Postgres is reachable
        run: |
          docker compose exec -T postgres pg_isready -U postgres -d kyfo_db

      - name: Validate Liquibase changelog
        env:
          LIQUIBASE_URL: jdbc:postgresql://localhost:5432/kyfo_db
          LIQUIBASE_USERNAME: postgres
          LIQUIBASE_PASSWORD: postgres
        run: ./gradlew validate --stacktrace

      - name: Apply Liquibase Migrations
        env:
          LIQUIBASE_URL: jdbc:postgresql://localhost:5432/kyfo_db
          LIQUIBASE_USERNAME: postgres
          LIQUIBASE_PASSWORD: postgres
        run: ./gradlew update --stacktrace

      - name: Build and run tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/kyfo_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SPRING_LIQUIBASE_ENABLED: "false"
        run: ./gradlew build

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs postgres

      - name: Tear down containers
        if: always()
        run: docker compose down -v

